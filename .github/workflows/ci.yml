name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  frontend-and-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/requirements.txt pytest

      - name: Run Python tests when present
        shell: bash
        run: |
          if [ -f tests/test_chat_orchestrator.py ]; then
            pytest tests/test_chat_orchestrator.py
          else
            echo "No Python tests found yet; skipping pytest."
          fi
